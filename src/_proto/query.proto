syntax = "proto3";

package query;


message QueryRequest {
  DateFilter dateFilter = 1;
  Search search = 2;
  int32 sort = 3;
  Paginate paginate = 4;
  repeated Condition condition = 5;
  repeated InNumber inNumber = 6;
  repeated InString inString = 7;
  repeated string joins = 8;
  repeated string select = 9;
}

message DateFilter {
  string startDate = 1;
  string endDate = 2;
}

message Search {
  repeated string searchField = 1;
  string q = 2;
}

message Paginate {
  int32 limit = 1;
  int32 page = 2;
}

message Condition {
  string field = 1;
  string value = 2;
}

message InNumber {
  string field = 1;
  repeated int32 value = 2;
}

message InString {
  string field = 1;
  repeated string value = 2;
}