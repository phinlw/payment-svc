syntax = "proto3";

package generateQr;

import "common.proto";

service GenerateQrService {
  rpc GenerateQrCreate(CreateGenerateQrRequest) returns (CreateGenerateQrResponse);
  rpc GenerateQrUpdate(UpdateGenerateQrRequest) returns (UpdateGenerateQrResponse);
  rpc GenerateQrDelete(DeleteGenerateQrRequest) returns (DeleteGenerateQrResponse);
  rpc GenerateQrLoadAll(common.QueryString) returns (LoadAllGenerateQrResponse);
  rpc GenerateQrLoadById(LoadGenerateQrByIdRequest) returns (LoadGenerateQrByIdResponse);
  rpc GenerateQr(GenerateQrRequest) returns (GenerateQrResponse);
  rpc GenerateQrNotifyPayment(NotifyPaymentRequest) returns (NotifyPaymentResponse);
  rpc GenerateQrRetryPayment(RetryPaymentRequest) returns (RetryPaymentResponse);
}

message CreateGenerateQrRequest {
    string paymentProviderId = 1;
    string userId = 2;
    string qrType = 3;
    string platformType = 4;
    string merchantId = 5;
    string terminalId = 6;
    string promotionCode = 7;
    string expiryTime = 8;
    string makeTxnTime = 9;
    double amount = 10;
    string currency = 11;
    string ref1 = 12;
    string ref2 = 13;
    string ref3 = 14;
    string mobileNum = 15;
    DeeplinkMetaData deeplinkMetaData = 16;
    string metadata = 17;
    string callbackUrl = 18;
    string callbackKey = 19;
}

message CreateGenerateQrResponse {
    string _id = 100;
    int32 uniqueId = 101;
    string paymentProviderId = 104;
    string userId = 1;
    string expiryTime = 2;
    string qrCode = 3;
    string qrCodeUrl = 4;
    double amount = 5;
    string currency = 6;
    string ref1 = 7;
    string ref2 = 8;
    string ref3 = 9;
    string providerName = 10;
    DeeplinkInfo deeplinkInfo = 11;
    string createdAt = 102;
    string updatedAt = 103;
}

message DeeplinkInfo {
    string transactionId = 1;
    string deeplinkURL = 2;
}

message DeleteGenerateQrRequest {
    string _id = 100;
}

message DeleteGenerateQrResponse {
    string _id = 100;
}

message UpdateGenerateQrRequest {
    string _id = 100;
    string name = 1;
}

message UpdateGenerateQrResponse {
    string _id = 100;
    int32 uniqueId = 101;
    bool isActive = 102;
    string createdAt = 103;
    string updatedAt = 104;
    string name = 1;
}

message LoadAllGenerateQrRequest {
    string name = 1;
}

message LoadAllGenerateQrResponse {
    repeated ResponseGenerateQrModel items = 1;
    int32 total = 2;
}

message LoadGenerateQrByIdRequest {
    string _id = 100;
}

message LoadGenerateQrByIdResponse {
    string _id = 100;
    int32 uniqueId = 101;
    string paymentProviderId = 104;
    string userId = 1;
    string expiryTime = 2;
    string qrCode = 3;
    string qrCodeUrl = 4;
    double amount = 5;
    string currency = 6;
    string ref1 = 7;
    string ref2 = 8;
    string ref3 = 9;
    string providerName = 10;
    DeeplinkInfo deeplinkInfo = 11;
    string callbackUrl = 12;
    string callbackKey = 13;
    string status = 14;
    bool isActive = 102;
    string createdAt = 103;
    string updatedAt = 105;
}

message ResponseGenerateQrModel {
    string _id = 100;
    int32 uniqueId = 101;
    string paymentProviderId = 104;
    string userId = 1;
    string expiryTime = 2;
    string qrCode = 3;
    string qrCodeUrl = 4;
    double amount = 5;
    string currency = 6;
    string ref1 = 7;
    string ref2 = 8;
    string ref3 = 9;
    string providerName = 10;
    DeeplinkInfo deeplinkInfo = 11;
    string callbackUrl = 12;
    string callbackKey = 13;
    string status = 14;
    bool isActive = 102;
    string createdAt = 103;
    string updatedAt = 105;
}

message DeeplinkMetaData {
    string deeplink = 1;
    string switchBackURL = 2;
    string switchBackInfo = 3;
}

message GenerateQrRequest {
    string qrType = 1;
    string platformType = 2;
    string merchantId = 3;
    string terminalId = 4;
    string promotionCode = 5;
    string expiryTime = 6;
    string makeTxnTime = 7;
    double amount = 8;
    string currency = 9;
    string ref1 = 10;
    string ref2 = 11;
    string ref3 = 12;
    string mobileNum = 13;
    DeeplinkMetaData deeplinkMetaData = 14;
    string metadata = 15;
}

message QrDataResponse {
    string processingStatus = 1;
    string responseDt = 2;
    string qrCode = 3;
    string expiredTime = 4;
    string qrCodeUrl = 5;
}

message QrApiResponse {
    string status = 1;
    string message = 2;
    QrDataResponse dataResponse = 3;
}

message GenerateQrResponse {
    bool success = 1;
    QrApiResponse apiResponse = 2;
}

message NotifyPaymentRequest {
  // TODO: Add request fields
  // Example: string _id = 1;
}

message NotifyPaymentResponse {
  // TODO: Add response fields
  // Example: string _id = 100;
  // Example: int32 uniqueId = 101;
  // Example: bool isActive = 102;
  // Example: string createdAt = 103;
  // Example: string updatedAt = 104;
}

message RetryPaymentRequest {
  string _id = 1;
}

message RetryPaymentResponse {
  int32 code = 100;
  string status = 101;
  string message = 102;
  RetryPaymentData data = 103;
}

message RetryPaymentData {
  string _id = 100;
  int32 uniqueId = 101;
  string paymentProviderId = 1;
  string userId = 2;
  string qrType = 3;
  string platformType = 4;
  string merchantId = 5;
  string terminalId = 6;
  string promotionCode = 7;
  string expiryTime = 8;
  string makeTxnTime = 9;
  double amount = 10;
  string currency = 11;
  string ref1 = 12;
  string ref2 = 13;
  string ref3 = 14;
  string mobileNum = 15;
  string qrCode = 16;
  string qrCodeUrl = 17;
  string callbackUrl = 18;
  string callbackKey = 19;
  string recordStatus = 20;
  bool isActive = 102;
  string createdAt = 103;
  string updatedAt = 104;
}
